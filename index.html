<!DOCTYPE html>
<html>
<body>
    <h2>Todo App</h2>

    <form action="/add" method="post">
        <input type="text" name="task">
        <button type="submit">Add</button>
    </form>

    <ul>
        {% for task in tasks %}
            <li>{{ task }}<a href="/delete/{{ loop.index0 }}">Delete</a></li>
        {% endfor %}
    </ul>
</body>
</html>
